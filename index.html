<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLAME 2026 – 2° Congresso Latino-americano de Medicina de Emergência</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #d6e8f5;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    /* ── Wrapper – narrow vertical banner ── */
    .banner {
      width: 420px;
      background: #ffffff;
      overflow: hidden;
    }

    /* ════════════════════════════════════
       1. HEADER
    ════════════════════════════════════ */
    .header {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px 14px;
      gap: 8px;
      min-height: 170px;
    }

    .header-logo {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      max-width: 140px;
    }

    .header-logo .congresso-num {
      font-size: 11px;
      font-weight: 700;
      color: #1b2b6b;
    }

    .header-logo .congresso-title {
      font-size: 12.5px;
      font-weight: 700;
      color: #1b2b6b;
      line-height: 1.3;
    }

    .header-logo .flame-tag {
      display: inline-block;
      background: #c8102e;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 3px;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .header-map {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
    }

    .header-map img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* placeholder when image is absent */
    .img-placeholder {
      width: 100%;
      height: 100%;
      background: #e0ecf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #8aaccc;
      text-align: center;
      border-radius: 4px;
    }

    .header-date {
      text-align: right;
      max-width: 130px;
    }

    .header-date .dates {
      font-size: 19px;
      font-weight: 800;
      color: #1b2b6b;
      line-height: 1.1;
    }

    .header-date .year {
      font-size: 16px;
      font-weight: 800;
      color: #1b2b6b;
    }

    .header-date .venue {
      font-size: 10px;
      color: #444;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ════════════════════════════════════
       2. INTRO PARAGRAPH
    ════════════════════════════════════ */
    .intro {
      background: #eaf4fb;
      padding: 16px 18px;
      font-size: 12.5px;
      color: #222;
      line-height: 1.65;
    }

    .intro strong {
      font-weight: 700;
    }

    /* ════════════════════════════════════
       3. CATEGORIA RESIDENTES (red box)
    ════════════════════════════════════ */
    .residentes {
      background: #c8102e;
      padding: 18px 18px 20px;
      color: #fff;
    }

    .residentes-title {
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.2px;
    }

    .residentes-body {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .residentes-text {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      flex: 1;
    }

    /* ticket badge */
    .ticket-badge {
      flex-shrink: 0;
      background: #fff;
      color: #c8102e;
      border: 2px dashed #c8102e;
      border-radius: 6px;
      padding: 8px 12px;
      text-align: center;
      min-width: 110px;
    }

    .ticket-badge .valor-label {
      font-size: 9.5px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .ticket-badge .valor-price {
      font-size: 18px;
      font-weight: 900;
      color: #c8102e;
      display: block;
      line-height: 1.2;
      margin-top: 2px;
    }

    .ticket-badge .ticket-icon {
      width: 28px;
      height: 28px;
      margin: 0 auto 4px;
    }

    .ticket-badge .ticket-icon img,
    .ticket-badge .ticket-icon .img-placeholder {
      border-radius: 3px;
    }

    .residentes-desc {
      font-size: 11px;
      color: #ffe8e8;
      line-height: 1.55;
      margin-top: 12px;
    }

    /* ════════════════════════════════════
       4. ATENÇÃO À DATA
    ════════════════════════════════════ */
    .atencao-section {
      background: #ffffff;
      padding: 0;
    }

    /* red callout pill */
    .atencao-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #c8102e;
      padding: 10px 18px;
    }

    .atencao-pill-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .atencao-pill-icon img,
    .atencao-pill-icon .img-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .atencao-pill-text {
      color: #fff;
    }

    .atencao-pill-text .atencao-word {
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      display: block;
    }

    .atencao-pill-text .adate-word {
      font-size: 13px;
      font-weight: 700;
      display: block;
    }

    .virada-text {
      font-size: 17px;
      font-weight: 900;
      color: #1b2b6b;
      padding: 12px 18px 0;
      line-height: 1.25;
    }

    .atencao-body {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px 12px;
    }

    .atencao-body-text {
      flex: 1;
    }

    .atencao-body-text p {
      font-size: 12.5px;
      color: #222;
      line-height: 1.55;
      margin-bottom: 4px;
    }

    .atencao-body-text .highlight {
      font-size: 13px;
      font-weight: 700;
      color: #c8102e;
    }

    .percent-bubble {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
    }

    .percent-bubble img,
    .percent-bubble .img-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .atencao-footer-text {
      text-align: center;
      font-size: 12px;
      color: #444;
      font-style: italic;
      padding: 0 18px 16px;
    }

    /* ════════════════════════════════════
       5. POCUS BÁSICO (dark blue box)
    ════════════════════════════════════ */
    .pocus {
      background: #1b4f9e;
      padding: 22px 20px 24px;
      color: #fff;
    }

    .pocus-title {
      font-size: 19px;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .pocus-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .pocus-meta-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pocus-meta-item .meta-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .pocus-meta-item .meta-icon img,
    .pocus-meta-item .meta-icon .img-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }

    .pocus-meta-item span {
      font-size: 13px;
      font-weight: 700;
    }

    .pocus-divider {
      width: 1px;
      height: 30px;
      background: rgba(255,255,255,0.4);
      margin: 0 4px;
    }

    .pocus-desc {
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
      color: #d8e8ff;
      margin-bottom: 6px;
    }

    .pocus-vagas {
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      margin-top: 10px;
    }

    /* ════════════════════════════════════
       6. PALESTRA MAGNA (speaker section)
    ════════════════════════════════════ */
    .speaker-section {
      background: #0d1f4a;
      display: flex;
      align-items: flex-end;
      gap: 0;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }

    .speaker-photo {
      width: 165px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .speaker-photo img {
      width: 100%;
      display: block;
    }

    .speaker-photo .img-placeholder {
      width: 100%;
      height: 220px;
      border-radius: 0;
    }

    .speaker-info {
      flex: 1;
      padding: 20px 14px 20px 8px;
      color: #fff;
    }

    .palestra-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #90b8e8;
      margin-bottom: 2px;
    }

    .palestra-magna {
      font-size: 13.5px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .palestra-subtitle {
      font-size: 11px;
      color: #b8d0f0;
      line-height: 1.4;
      margin-bottom: 10px;
      font-style: italic;
    }

    .speaker-detail {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .speaker-detail .detail-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .speaker-detail .detail-icon img,
    .speaker-detail .detail-icon .img-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 3px;
    }

    .speaker-detail span {
      font-size: 11.5px;
      color: #fff;
      font-weight: 600;
    }

    .speaker-bio {
      font-size: 10px;
      color: #90a8c8;
      line-height: 1.55;
      margin-top: 10px;
    }

    /* ════════════════════════════════════
       7. FOOTER
    ════════════════════════════════════ */
    .footer {
      background: #1b2b6b;
      padding: 20px 20px 14px;
      text-align: center;
      color: #fff;
    }

    .footer-headline {
      font-size: 13.5px;
      font-weight: 800;
      line-height: 1.45;
      margin-bottom: 14px;
    }

    /* CTA box */
    .footer-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #ffffff;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 16px;
    }

    .footer-cta-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .footer-cta-icon img,
    .footer-cta-icon .img-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 6px;
    }

    .footer-cta-text {
      text-align: left;
    }

    .footer-cta-text .cta-action {
      font-size: 12px;
      font-weight: 700;
      color: #1b2b6b;
    }

    .footer-cta-text .cta-url {
      font-size: 12px;
      color: #c8102e;
      font-weight: 800;
      word-break: break-all;
    }

    /* sponsor logos row */
    .sponsor-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .sponsor-logo {
      width: 50px;
      height: 28px;
    }

    .sponsor-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .sponsor-logo .img-placeholder {
      border-radius: 3px;
      font-size: 9px;
    }

    .sponsor-labels {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .sponsor-label-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .sponsor-label-item span {
      font-size: 8.5px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
<div class="banner">

  <!-- ══════════════════════════════════
       1. HEADER
  ══════════════════════════════════ -->
  <header style="padding:0; margin:0; line-height:0;">
    <img src="assets/globe.png" alt="Header FLAME 2026" style="width:100%; display:block;">
  </header>

  <!-- ══════════════════════════════════
       2. INTRO
  ══════════════════════════════════ -->
  <section class="intro">
    O FLAME 2026 reúne lideranças, especialistas e residentes para discutir os rumos da Medicina de Emergência na América Latina, com foco em <strong>prática real, atualização científica</strong> e visão estratégica da especialidade.
  </section>

  <!-- ══════════════════════════════════
       3. CATEGORIA RESIDENTES
  ══════════════════════════════════ -->
  <section style="padding:0; margin:0; line-height:0;">
    <img src="assets/Image-ticket.png" alt="Categoria exclusiva para Residentes" style="width:100%; display:block;">
  </section>

  <!-- ══════════════════════════════════
       4. ATENÇÃO À DATA
  ══════════════════════════════════ -->
  <section style="padding:0; margin:0; line-height:0;">
    <img src="assets/percentage.png" alt="Atenção à data" style="width:100%; display:block;">
  </section>

  <!-- ══════════════════════════════════
       5. POCUS BÁSICO
  ══════════════════════════════════ -->
  <section style="padding:0; margin:0; line-height:0;">
    <img src="assets/info.png" alt="Curso Pré-Congresso POCUS Básico" style="width:100%; display:block;">
  </section>

  <!-- ══════════════════════════════════
       6. PALESTRA MAGNA
  ══════════════════════════════════ -->
  <section style="padding:0; margin:0; line-height:0;">
    <img src="assets/person.jpeg" alt="Palestra Magna" style="width:100%; display:block;">
  </section>

</div>
</body>
</html>
